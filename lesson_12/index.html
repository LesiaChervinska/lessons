<!doctype html>
<html lang="zxx">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      href="https://fonts.googleapis.com/css?family=Barlow:regular,500&display=swap"
      rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <title>12</title>
  </head>
  <body>
    <div class="wrapper">
      <header class="header">
        <div class="header__container">
          <div class="header__menu menu">
            <ul class="menu__list">
              <li class="menu__item">
                <a href="#" class="menu__link">About</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__link">Items</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__link">Contacts</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__link">Price</a></li>
            </ul>
          </div>
        </div>
      </header>
      <main class="page">
        <div class="page__container">
          <h1 class="page__title">Переходи transition та анімації animation</h1>
          <div class="page__train-section train">
            <ul class="train__list">
              <li class="train__item">
                <div class="train__box"></div>
              </li>
              <li class="train__item">
                <div class="train__box"></div>
              </li>
              <li class="train__item">
                <div class="train__box"></div>
              </li>
              <li class="train__item">
                <div class="train__box"></div>
              </li>
              <li class="train__item">
                <div class="train__box"></div>
              </li>
              <li class="train__item">
                <div class="train__box"></div>
              </li>
              <li class="train__item">
                <div class="train__box"></div>
              </li>
              <li class="train__item">
                <div class="train__box"></div>
              </li>
            </ul>
          </div>
        </div>
        <div class="animation animation--size">
          <div class="animation__cometa cometa">
            <ul class="cometa__list">
              <li class="cometa__item"></li>
              <li class="cometa__item"></li>
              <li class="cometa__item"></li>
            </ul>
          </div>
          <div class="animation__ufo ufo">
            <div class="ufo__top">
              <div class="ufo__receiver"></div>
            </div>
            <div class="ufo__bottom">
              <ul class="ufo__ligt-list">
                <li class="ufo__item-light"></li>
                <li class="ufo__item-light"></li>
                <li class="ufo__item-light"></li>
                <li class="ufo__item-light"></li>
                <li class="ufo__item-light"></li>
                <li class="ufo__item-light"></li>
                <li class="ufo__item-light"></li>
                <li class="ufo__item-light"></li>
                <li class="ufo__item-light"></li>
              </ul>
              <div class="ufo__headlight"></div>
              <div class="ufo__trapdoor"></div>
              <div class="ufo__tripod">
                <div class="ufo__first-leg"></div>
                <div class="ufo__second-leg"></div>
                <div class="ufo__third-leg"></div>
              </div>
            </div>
            <div class="ufo__person"></div>
          </div>
        </div>

      </main>
      <footer class="footer">
        <div class="footer__container">
          <div class="footer__box">
            <a href="#top" class="footer__link">Піднятися на верх</a>
